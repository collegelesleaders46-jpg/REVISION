<script id="revision-hub-pediatrie-guard">
(function(){
  'use strict';
  const KEY='revision-hub-session-v1';
  let session=null;
  try{session=JSON.parse(localStorage.getItem(KEY)||'null')}catch(_){session=null}
  if(!session||!session.code){
    localStorage.removeItem(KEY);
    location.replace('index.html');
    return;
  }
  window.PEDIATRIE_HUB_SESSION=session;
})();
</script>
<div class="revision-hub-pediatrie" id="revisionHubPediatrie">
  <div class="hub-left"><a href="index.html">← Choisir un autre site</a><span class="hub-user" id="revisionHubPediatrieUser">Étudiant</span></div>
  <div class="hub-right"><button type="button" id="revisionHubPediatrieLogout">Déconnexion</button></div>
</div>
<script id="revision-hub-pediatrie-controls">
document.addEventListener('DOMContentLoaded',function(){
  const session=window.PEDIATRIE_HUB_SESSION||{};
  const user=document.getElementById('revisionHubPediatrieUser');
  if(user) user.textContent='👤 '+(session.name||'Étudiant');
  const logout=document.getElementById('revisionHubPediatrieLogout');
  if(logout) logout.addEventListener('click',function(){
    localStorage.removeItem('revision-hub-session-v1');
    localStorage.removeItem('quizPromoSession');
    sessionStorage.removeItem('sp-site-access-v3');
    sessionStorage.removeItem('sp-site-account-v3');
    location.href='index.html';
  });
});
</script><header class="topbar"><div class="brand"><div class="brand-logo">C</div><div><strong>Étude de cas</strong><small>Démarche de soins infirmiers</small></div></div><nav class="topnav"><a class="navlink" href="pediatrie.html">Document</a><a class="navlink" href="pediatrie-quiz.html">Quiz</a><a class="navlink optional" href="pediatrie-qroc.html">QROC</a><a class="navlink active" href="pediatrie-cas.html">Étude de cas</a></nav></header><main class="wrap"><section class="hero"><h1>Cas clinique de Thermalys</h1><p>Démarche diagnostique, diagnostic infirmier, besoins fondamentaux et plan de soins.</p><div class="stats"><span class="stat">Énoncé page 79</span><span class="stat">Corrigé pages 152 à 154</span></div></section><section class="panel"><div class="tabs"><button class="primary" id="statementBtn">Énoncé</button><button class="ghost" id="answerBtn">Corrigé complet</button></div><div id="casePages" class="case-pages"></div></section></main><script>

window.PedApp=(()=>{
 const PAGE_W=595.32;
 const pathFor=p=>`page-${String(p).padStart(3,'0')}.webp`;
 function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
 function renderSegments(container,segments,{link=true}={}){
   container.innerHTML='';
   const pages=[...new Set((segments||[]).map(s=>s.page))];
   if(!pages.length)return;
   pages.forEach(p=>{
     const a=document.createElement('a');a.className='ghost';a.href=`document-pediatrie.pdf#page=${p}`;a.target='_blank';a.rel='noopener';a.textContent=`Voir la page ${p} du PDF`;container.appendChild(a);
   });
 }
 function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
 function toast(msg){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.body.appendChild(el)}el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2300)}
 function fmtDate(iso){try{return new Intl.DateTimeFormat('fr-FR',{dateStyle:'short',timeStyle:'short'}).format(new Date(iso))}catch{return iso}}
 return{PAGE_W,pathFor,esc,renderSegments,shuffle,toast,fmtDate};
})();

</script><script>const box=document.getElementById('casePages');function show(pages,answer){box.innerHTML='';pages.forEach(p=>{const d=document.createElement('a');d.className='case-page';d.href=`index.html#page-${p}`;d.innerHTML=`<img loading="lazy" src="${PedApp.pathFor(p)}" alt="Page ${p}">`;box.appendChild(d)});document.getElementById('statementBtn').className=answer?'ghost':'primary';document.getElementById('answerBtn').className=answer?'primary':'ghost'}document.getElementById('statementBtn').onclick=()=>show([79],false);document.getElementById('answerBtn').onclick=()=>show([152,153,154],true);show([79],false);</script>  <script src="avertissement.js"></script>
